$kind: http-request
name: Create Release (Admin)
method: POST
url: '{{baseUrl}}/api/v1/releases'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Abbey Road",
      "year": 1969,
      "artistId": "{{artistId}}",
      "coverUrl": "https://example.com/abbey-road.jpg",
      "description": "Iconic album by The Beatles",
      "genreIds": [],
      "tracks": [
        {
          "position": 1,
          "title": "Come Together",
          "durationSeconds": 259,
          "side": "A"
        },
        {
          "position": 2,
          "title": "Something",
          "durationSeconds": 182,
          "side": "A"
        }
      ]
    }
