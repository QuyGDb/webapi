$kind: http-request
name: Create Release Version (Admin)
method: POST
url: '{{baseUrl}}/api/v1/releaseversions'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "releaseId": "{{releaseId}}",
      "labelId": "{{labelId}}",
      "pressingCountry": "US",
      "pressingYear": 1969,
      "format": "Vinyl",
      "catalogNumber": "PCS 7088",
      "notes": "Original UK pressing"
    }
