$kind: http-request
name: Update Label
method: PUT
url: '{{baseUrl}}/api/v1/labels/{{labelId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id": "{{labelId}}",
      "name": "Blue Note Records",
      "country": "US",
      "foundedYear": 1939,
      "website": "https://www.bluenote.com"
    }
