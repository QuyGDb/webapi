$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/v1/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "Password123!",
      "fullName": "John Doe"
    }
