$kind: http-request
name: Create Genre (Admin)
method: POST
url: '{{baseUrl}}/api/v1/genres'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jazz",
      "slug": "jazz"
    }
