$kind: http-request
name: Update Artist (Admin)
method: PUT
url: '{{baseUrl}}/api/v1/artists/{{artistId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id": "{{artistId}}",
      "name": "The Beatles",
      "bio": "Updated bio",
      "genre": "Rock",
      "country": "UK",
      "imageUrl": "https://example.com/beatles.jpg"
    }
