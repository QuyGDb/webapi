$kind: http-request
name: Create Artist (Admin)
method: POST
url: '{{baseUrl}}/api/v1/artists'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "The Beatles",
      "bio": "Legendary British rock band",
      "genre": "Rock",
      "country": "UK",
      "imageUrl": "https://example.com/beatles.jpg"
    }
