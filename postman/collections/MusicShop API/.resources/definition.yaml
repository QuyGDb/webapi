$kind: collection
name: MusicShop API
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
variables:
  - key: baseUrl
    value: 'http://localhost:5000'
  - key: accessToken
    value: ''
  - key: refreshToken
    value: ''
  - key: artistId
    value: ''
  - key: labelId
    value: ''
  - key: releaseId
    value: ''
